<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a73e8">
<title>資產盤點系統 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ═══ 此處省略 CSS 部分，與原先內容相同以節省篇幅 ═══ */
/* ═══════════════════════════════════════════════════════════
    DESIGN TOKENS & STYLES (保留原始內容)
═══════════════════════════════════════════════════════════ */
:root { --pri: #1a73e8; --pri-d: #1557b0; --pri-l: #e8f0fe; --green: #0f9d58; --green-l:#e6f4ea; --red: #d93025; --red-l: #fce8e6; --yellow: #e37400; --yellow-l:#fef7e0; --orange: #e8710a; --orange-l:#fce8d5; --bg: #f0f4ff; --surface:#ffffff; --border: #dadce0; --border2:#e8eaed; --text: #202124; --text2: #5f6368; --text3: #9aa0a6; --shadow: 0 1px 4px rgba(60,64,67,.18), 0 2px 8px rgba(60,64,67,.10); --shadow-lg: 0 4px 20px rgba(60,64,67,.22); --r: 14px; --r-sm: 10px; --r-lg: 20px; --mono: 'JetBrains Mono', monospace; --body: 'Noto Sans TC', sans-serif; --bar-h: 56px; --nav-h: 64px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
.w-full { width: 100%; }
.flex { display: flex; align-items: center; }
.spinner { width: 24px; height: 24px; border: 2.5px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .75s linear infinite; flex-shrink: 0; }
input, select, textarea { font-family: var(--body); font-size: 15px; color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 13px 15px; outline: none; width: 100%; transition: border-color .15s, box-shadow .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(26,115,232,.16); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; min-height: 48px; padding: 12px 22px; border-radius: var(--r-sm); font-family: var(--body); font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--pri); color: #fff; }
.btn-ghost { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
#splash { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: #fff; }
#login-screen { position: fixed; inset: 0; z-index: 200; background: linear-gradient(160deg, #e8f0fe 0%, #f8faff 60%, #e6f4ea 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #fff; border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); text-align: center; animation: fadeUp .4s ease; }
#app { display: none; position: fixed; inset: 0; flex-direction: column; }
.topbar { height: var(--bar-h); background: #fff; border-bottom: 1px solid var(--border2); padding: 0 16px; display: flex; align-items: center; gap: 10px; z-index: 100; }
.content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0) + 8px); }
.page { display: none; padding-bottom: 16px; }
.page.active { display: block; animation: fadeUp .22s ease; }
.filter-strip { background: #fff; border-bottom: 1px solid var(--border2); padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 90; }
.asset-card { background: #fff; border-radius: var(--r); border: 1.5px solid var(--border2); margin: 10px 16px; overflow: hidden; cursor: pointer; }
.bottom-nav { height: var(--nav-h); background: #fff; border-top: 1px solid var(--border2); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 110; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; background: transparent; border: none; color: var(--text3); }
.nav-btn.active { color: var(--pri); }
.sheet-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, .45); z-index: 300; display: flex; align-items: flex-end; }
.sheet { background: #fff; border-radius: 26px 26px 0 0; width: 100%; max-height: 92dvh; display: flex; flex-direction: column; animation: slideUp .3s ease; }
.sheet-body { overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 18px; }
.toast-stack { position: fixed; top: 68px; left: 50%; transform: translateX(-50%); z-index: 1000; width: calc(100% - 32px); max-width: 400px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: #323232; color: #fff; border-radius: var(--r-sm); padding: 13px 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; animation: fadeUp .25s ease; }
.upload-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 16px; }
.upload-ring-svg { transform: rotate(-90deg); }
.upload-ring-track { fill: none; stroke: rgba(0,0,0,.1); stroke-width: 5; }
.upload-ring-fill { fill: none; stroke: var(--yellow); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 138.2; stroke-dashoffset: 138.2; transition: stroke-dashoffset .3s ease; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">📋</div>
  <h1>資產盤點系統</h1>
  <p>正在連線至雲端資料庫…</p>
  <div class="spinner" style="margin-top:8px;"></div>
</div>

<div id="login-screen" class="hidden">
  <div class="login-card">
    <div class="lc-icon">📋</div>
    <h1>資產盤點系統</h1>
    <div class="lc-sub">11 位人員協作盤點平台<br>請選擇您的名字以繼續</div>
    <label>您是？</label>
    <select id="login-name">
      <option value="">── 請選擇您的名字 ──</option>
    </select>
    <button class="btn btn-primary w-full" style="margin-top:16px;" onclick="doLogin()">進入系統</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">盤點<span> Pro</span></div>
    <div class="topbar-sep"></div>
    <div id="sync-badge" class="sync-badge idle">● 就緒</div>
    <div class="user-pill" onclick="doLogout()">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-name" id="user-name-label">—</div>
    </div>
  </div>

  <div class="content-area" id="content-area">
    <div class="page active" id="page-list">
      <div class="filter-strip">
        <div class="search-box">
          <input type="search" id="search-inp" placeholder="搜尋名稱、財產編號、地點…" oninput="scheduleFilter()">
        </div>
        <div class="chip-row" id="chip-row">
          <div class="chip active" data-f="all" onclick="setChip('all',this)">全部</div>
          <div class="chip" data-f="待盤點" onclick="setChip('待盤點',this)">🕐 待盤點</div>
          <div class="chip" data-f="已盤點" onclick="setChip('已盤點',this)">✅ 已盤點</div>
        </div>
      </div>
      <div class="asset-list" id="asset-list"></div>
    </div>
    </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-list" onclick="switchPage('list', this)">📋 清單</button>
    <button class="nav-btn" id="nav-dash" onclick="switchPage('dash', this)">📊 統計</button>
    <button class="nav-btn" id="nav-settings" onclick="switchPage('settings', this)">⚙️ 設定</button>
  </nav>
</div>

<div class="sheet-overlay hidden" id="sheet-overlay" onclick="closeSheetOnBg(event)">
  <div class="sheet">
    <div class="sheet-hd">
      <div class="sheet-title" id="sheet-title">資產詳情</div>
      <button class="btn-icon" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script>
'use strict';

const CONFIG = {
  // 核心：務必確保此網址為最新部署的 /exec 網址
  API_URL: 'https://script.google.com/macros/s/AKfycbxVcc8hrcufN7YRblodyiozJ0HeH7ePuSNN0M9hJEFXd31W8Yu520E_T0HNuw5CUlms/exec',
  MEMBERS: ['淳安','怡伶','淳瑜','曾晴','松霖','苡彣','珉瑄','佩玟','禹融','奕暄','雅欣'],
};

const S = {
  user: localStorage.getItem('inv_user') || '',
  apiUrl: localStorage.getItem('inv_url') || CONFIG.API_URL,
  assets: [],
  filtered: [],
  filterSt: 'all',
  editAsset: null,
  pendingPhoto: null,
};

const $ = id => document.getElementById(id);

/* ══════════════════════════════════════════════════════════
    修正後的 API 呼叫 (解決照片上傳失敗的關鍵)
══════════════════════════════════════════════════════════ */
async function apiFetch(url, opts) {
  // 使用 follow 處理 GAS 的跳轉
  var resp = await fetch(url, Object.assign({ redirect: 'follow' }, opts || {}));
  if (!resp.ok) { throw new Error('HTTP ' + resp.status); }
  var text = await resp.text();
  var json;
  try {
    json = JSON.parse(text);
  } catch (e) {
    throw new Error('伺服器回傳格式錯誤，請確認 GAS 已正確部署。');
  }
  if (!json.ok) { throw new Error(json.error || '伺服器未知錯誤'); }
  return json.data;
}

function apiGet(action) {
  return apiFetch(S.apiUrl + '?action=' + encodeURIComponent(action));
}

// 修正：將 payload 放在 body 傳送，避免 URL 過長
async function apiPost(body) {
  return apiFetch(S.apiUrl, {
    method: 'POST',
    body: JSON.stringify(body) 
  });
}

/* ══════════════════════════════════════════════════════════
    照片處理邏輯 (手動檢查符合後端 uploadPhoto 流程)
══════════════════════════════════════════════════════════ */
async function handlePhotoFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    toast('請選擇圖片檔案', 'warn'); return;
  }

  var saveBtn = $('save-btn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '📷 照片上傳中…'; }
  
  var statusEl = $('upload-status');
  statusEl.innerHTML = '<div class="upload-ring-wrap"><div class="upload-ring-label" id="ring-label">準備上傳...</div></div>';

  try {
    // 壓縮圖片（保持原邏輯）
    var compressed = await compressImage(file, 1200, 0.8);
    var b64 = await fileToB64(compressed);
    var raw = b64.split(',')[1]; // 取得純 Base64 字串

    if ($('ring-label')) $('ring-label').textContent = '正在上傳至雲端硬碟...';

    // 呼叫後端 uploadPhoto action
    var data = await apiPost({
      action: 'uploadPhoto',
      base64: raw,
      mimeType: compressed.type,
      fileName: Date.now() + '_' + file.name
    });

    if (!data || !data.url) throw new Error('後端未回傳圖片網址');

    S.pendingPhoto = data.url; // 暫存新照片網址

    statusEl.innerHTML = '<div style="color:var(--green)">✅ 上傳成功</div>';
    if ($('save-btn')) { 
      $('save-btn').disabled = false; 
      $('save-btn').textContent = '💾 儲存盤點結果'; 
    }
    toast('照片上傳成功', 'ok');
  } catch (e) {
    statusEl.innerHTML = '<div style="color:var(--red)">❌ 失敗：' + e.message + '</div>';
    if ($('save-btn')) { 
        $('save-btn').disabled = false; 
        $('save-btn').textContent = '💾 儲存 (照片未成功)'; 
    }
  }
}

/* ══════════════════════════════════════════════════════════
    其餘功能 (保留原始邏輯並修正變數命名衝突)
══════════════════════════════════════════════════════════ */
// 修正 updateDashboard 內 ok 變數與函式衝突問題
function updateDashboard() {
  var a = S.assets;
  var totalCount = a.length;
  var countDone = a.filter(x => (x.status || '').trim() === '已盤點').length;
  // ... 其餘繪圖與統計邏輯與原程式碼相同 ...
  var pct = totalCount > 0 ? Math.round(countDone / totalCount * 100) : 0;
  if($('dash-pct-label')) $('dash-pct-label').textContent = pct + '%';
}

// ── 以下為輔助工具與初始化 (保持不變) ──
function fileToB64(file) {
  return new Promise((res, rej) => {
    var r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function compressImage(file, maxPx, quality) {
  return new Promise((resolve, reject) => {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        resolve(new File([blob], file.name, { type: file.type || 'image/jpeg' }));
      }, file.type || 'image/jpeg', quality);
    };
    img.src = url;
  });
}

// 省略渲染列表、頁面切換等其餘 UI 函式，請保持原樣
// 務必保留您原始程式碼中所有與 DOM 互動的邏輯

function toast(msg, type) {
  var stack = $('toast-stack');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// 頁面載入初始化
window.onload = () => {
  if (S.user) {
    $('splash').classList.add('hidden');
    $('app').style.display = 'flex';
    // 載入資料
    apiGet('read').then(data => {
      S.assets = data;
      // renderList()...
    });
  } else {
    $('splash').classList.add('hidden');
    $('login-screen').classList.remove('hidden');
  }
};

</script>
</body>
</html>
