<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a73e8">
<title>資產盤點系統 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ═══ TOKENS ══════════════════════════════════════════════ */
:root{
  --pri:#1a73e8; --pri-d:#1557b0; --pri-l:#e8f0fe;
  --green:#0f9d58; --green-l:#e6f4ea;
  --red:#d93025;   --red-l:#fce8e6;
  --yellow:#e37400;--yellow-l:#fef7e0;
  --orange:#e8710a;--orange-l:#fce8d5;
  --bg:#f0f4ff; --surface:#ffffff;
  --border:#dadce0; --border2:#e8eaed;
  --text:#202124; --text2:#5f6368; --text3:#9aa0a6;
  --shadow:0 1px 4px rgba(60,64,67,.18),0 2px 8px rgba(60,64,67,.1);
  --shadow-lg:0 4px 20px rgba(60,64,67,.22);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --mono:'JetBrains Mono',monospace;
  --body:'Noto Sans TC',sans-serif;
  --bar-h:56px; --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;} 
body{font-family:var(--body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

.hidden{display:none!important;}
.flex{display:flex;align-items:center;}
.w-full{width:100%;}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}

/* ── INPUTS ── */
input,select,textarea{font-family:var(--body);font-size:15px;padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);outline:none;width:100%;}
input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(26,115,232,.1);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:48px;padding:12px 20px;border-radius:var(--r-sm);font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--pri);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text2);}
.btn-sm{min-height:36px;padding:8px 15px;font-size:13px;}

/* ── UI COMPONENTS ── */
#splash{position:fixed;inset:0;background:var(--pri);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.login-card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);text-align:center;}

#app{display:none;position:fixed;inset:0;flex-direction:column;}
.topbar{height:var(--bar-h);background:#fff;border-bottom:1px solid var(--border2);padding:0 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.content-area{flex:1;overflow-y:auto;padding-bottom:20px;}

.filter-strip{background:#fff;padding:12px 16px;position:sticky;top:0;z-index:90;border-bottom:1px solid var(--border2);}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0;}
.chip{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid var(--border);white-space:nowrap;cursor:pointer;}
.chip.active{background:var(--pri-l);border-color:var(--pri);color:var(--pri);}

.asset-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
.asset-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--border2);padding:15px;box-shadow:var(--shadow);position:relative;}
.status-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:99px;float:right;}
.sb-pending{background:var(--yellow-l);color:var(--yellow);}
.sb-checked{background:var(--green-l);color:var(--green);}

.bottom-nav{height:var(--nav-h);background:#fff;border-top:1px solid var(--border2);display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);border:none;background:none;}
.nav-btn.active{color:var(--pri);}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-end;}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:20px;max-height:90%;overflow-y:auto;animation:slideUp 0.3s;}

.toast-stack{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:1000;width:90%;max-width:400px;display:flex;flex-direction:column;gap:8px;}
.toast{background:#323232;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}

@media(min-width:768px){ .asset-list, .filter-strip {max-width:720px; margin:auto;} }
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:60px">📋</div>
  <h2>資產盤點系統</h2>
  <p>正在連線至雲端資料庫...</p>
  <div class="spinner" style="margin-top:15px"></div>
</div>

<div id="login-screen" class="hidden">
  <div class="login-card">
    <div style="font-size:50px">👤</div>
    <h2 style="margin:10px 0">歡迎使用</h2>
    <p style="color:var(--text2);margin-bottom:20px">請選擇您的姓名以進入系統</p>
    <select id="login-name">
      <option value="">── 請選擇人員 ──</option>
      <option>淳安</option><option>怡伶</option><option>淳瑜</option><option>曾晴</option><option>松霖</option>
      <option>苡彣</option><option>珉瑄</option><option>佩玟</option><option>禹融</option><option>奕暄</option><option>雅欣</option>
    </select>
    <button class="btn btn-primary w-full" style="margin-top:15px" onclick="doLogin()">進入系統</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:900;color:var(--pri)">盤點 Pro</div>
    <div id="user-display" class="flex" style="gap:8px;font-size:13px;font-weight:700">
      <span id="user-name-label"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="content-area">
    <div class="page active" id="page-list">
      <div class="filter-strip">
        <input type="search" id="search-inp" placeholder="🔍 搜尋名稱、編號或地點..." oninput="applyFilter()">
        <div class="chip-row">
          <div class="chip active" onclick="setFilter('all', this)">全部</div>
          <div class="chip" onclick="setFilter('待盤點', this)">🕐 待盤點</div>
          <div class="chip" onclick="setFilter('已盤點', this)">✅ 已盤點</div>
        </div>
      </div>
      <div class="asset-list" id="asset-list"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active">📋<div>清單</div></button>
    <button class="nav-btn" onclick="loadData(true)">🔄<div>刷新</div></button>
  </nav>
</div>

<div class="sheet-overlay hidden" id="sheet-overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3 id="sheet-title">資產詳情</h3>
    <div id="sheet-body" style="margin-top:15px"></div>
    <button class="btn btn-ghost w-full" style="margin-top:20px" onclick="closeSheet()">關閉</button>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script>
'use strict';

const API_URL = 'https://script.google.com/macros/s/AKfycbyqdIo6jqFAukwSodiyM4m_GoIS1JrsVJmBJUQq8gqjczMsQ-u03lGXYiCvO8vv9qzV/exec';
const S = {
  user: localStorage.getItem('inv_user') || '',
  assets: [],
  filtered: [],
  filterSt: 'all'
};

const $$ = id => document.getElementById(id);

// ── BOOT ──
window.addEventListener('DOMContentLoaded', async () => {
  if (S.user) {
    launchApp();
  } else {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

function doLogin() {
  const name = $$('login-name').value;
  if (!name) return alert('請選擇名字');
  S.user = name;
  localStorage.setItem('inv_user', name);
  location.reload();
}

function doLogout() {
  localStorage.clear();
  location.reload();
}

async function launchApp() {
  $$('splash').style.display = 'none';
  $$('app').style.display = 'flex';
  $$('user-name-label').textContent = S.user;
  loadData();
}

async function loadData(showToast = false) {
  try {
    const resp = await fetch(API_URL + '?action=read', { redirect: 'follow' });
    const json = await resp.json();
    if (json.ok) {
      S.assets = json.data;
      applyFilter();
      if(showToast) toast('資料已更新');
    }
  } catch (e) {
    toast('連線失敗: ' + e.message);
  }
}

function setFilter(st, el) {
  S.filterSt = st;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = ($$('search-inp').value || '').toLowerCase();
  S.filtered = S.assets.filter(a => {
    const matchQ = a.name.toLowerCase().includes(q) || (a.sn||'').toLowerCase().includes(q);
    const matchSt = S.filterSt === 'all' || a.status === S.filterSt;
    return matchQ && matchSt;
  });
  renderList();
}

function renderList() {
  const list = $$('asset-list');
  list.innerHTML = '';
  if (S.filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">查無資料</div>';
    return;
  }
  S.filtered.forEach(a => {
    const card = document.createElement('div');
    card.className = 'asset-card';
    card.innerHTML = `
      <span class="status-badge ${a.status==='已盤點'?'sb-checked':'sb-pending'}">${a.status}</span>
      <div style="font-weight:900;font-size:16px">${a.name}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:5px">編號: ${a.sn || '—'}</div>
      <div style="font-size:13px;color:var(--pri);margin-top:5px;font-weight:700">📍 ${a.loc || '未註記地點'}</div>
    `;
    card.onclick = () => openSheet(a);
    list.appendChild(card);
  });
}

function openSheet(a) {
  $$('sheet-title').textContent = a.name;
  $$('sheet-body').innerHTML = `
    <div style="line-height:2">
      <div><b>財產編號:</b> ${a.sn}</div>
      <div><b>存放地點:</b> ${a.loc}</div>
      <div><b>目前狀態:</b> ${a.status}</div>
      <div><b>盤點人員:</b> ${a.assignee || '尚未指派'}</div>
      <div style="margin-top:10px;color:var(--text2);font-size:12px">備註: ${a.note || '無'}</div>
    </div>
  `;
  $$('sheet-overlay').classList.remove('hidden');
}

function closeSheet() {
  $$('sheet-overlay').classList.add('hidden');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  $$('toast-stack').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
